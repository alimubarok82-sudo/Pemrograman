<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROGRAMMING LAB XI</title>
    <style>
        :root {
            /* Warna Utama */
            --primary: #2563eb;
            --secondary: #06b6d4;
            --accent: #8b5cf6;
            --bg: #020617;
            --bg-darker: #020617;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            /* Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow: hidden; /* App-like feel, disable body scroll */
        }

        /* Ambient Glow Background layer */
        .ambient-glow { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -2; pointer-events: none; }
        .glow-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: rgba(37, 99, 235, 0.2); }
        .glow-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: rgba(147, 51, 234, 0.2); }
        .glow-3 { top: 20%; right: 10%; width: 300px; height: 300px; background: rgba(6, 182, 212, 0.1); filter: blur(100px); }

        /* Particle Background layer */
        #particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: transparent;
        }

        /* Layout Container */
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            z-index: 10;
        }
        
        .logo {
            padding: 0 20px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--text), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 10px;
        }

        .menu-list { overflow-y: auto; flex: 1; padding: 0 10px; }
        
        .menu-item {
            padding: 12px 16px;
            margin: 0 6px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .menu-item:hover {
            color: white;
        }

        .menu-item.active {
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--glass-border); padding: 10px 0; }
            .menu-list { display: flex; overflow-x: auto; padding-bottom: 5px; }
            .menu-item { white-space: nowrap; margin-bottom: 0; margin-right: 5px; }
            .main-content { padding: 20px; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr !important; }
        }

        /* Sections (Views) */
        .section { display: none; animation: slideUp 0.5s ease forwards; opacity: 0; transform: translateY(20px); }
        .section.active { display: block; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* Typography */
        h1, h2, h3 { margin-bottom: 1rem; color: var(--text); }
        h1 { font-size: 2.2rem; background: linear-gradient(to right, var(--text), var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        p { margin-bottom: 1rem; color: var(--text-muted); }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 24px;
            transition: transform 0.3s;
        }
        .glass-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: inline-block;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .btn:hover { background: #3b82f6; box-shadow: 0 10px 20px -3px rgba(37, 99, 235, 0.4); transform: translateY(-1px); }
        
        /* Ripple effect */
        .ripple {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-anim 0.6s linear; background: rgba(255,255,255,0.3);
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* Grid Utilities */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .text-center { text-align: center; }
        .cursor-pointer { cursor: pointer; }

        /* Form Inputs */
        input, select, textarea {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            color: white; border-radius: 8px; outline: none; transition: border 0.3s;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); }

        /* Badges */
        .badge { display: inline-flex; align-items: center; gap:5px; padding: 6px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 500; background: var(--glass-bg); border: 1px solid var(--glass-border); margin: 5px; opacity: 0.5; filter: grayscale(1); transition: all 0.3s; }
        .badge.earned { opacity: 1; filter: grayscale(0); background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.2); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        /* Code Editor */
        .editor-container { display: flex; gap: 20px; height: 350px; flex-wrap: wrap;}
        .editor, .console {
            flex: 1; background: #1e1e1e; border-radius: 8px; padding: 15px; font-family: monospace; color: #d4d4d4;
            border: 1px solid var(--glass-border); min-width: 300px;
            display: flex; flex-direction: column;
        }
        .console { overflow-y: auto; }
        .editor textarea { width: 100%; flex: 1; background: transparent; border: none; color: inherit; font-family: inherit; resize: none; margin: 0; outline: none; overflow-y: auto;}
        
        /* Progress Bar */
        .progress-bg { background: rgba(30, 41, 59, 1); height: 8px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--primary), var(--accent)); height: 100%; width: 0%; transition: width 1s ease; }

        /* Triangle Visualizer */
        .triangle-box {
            width: 200px; height: 200px; position: relative; margin: 20px auto;
            border-bottom: 2px solid var(--glass-border);
            display: flex; justify-content: center; align-items: flex-end;
        }
        .triangle {
            width: 0; height: 0;
            border-left: 50px solid transparent; border-right: 50px solid transparent; border-bottom: 100px solid var(--secondary);
            transition: all 0.5s;
        }

        /* Toast Notification */
        #toast {
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 12px 25px; border-radius: 30px;
            transition: bottom 0.3s; z-index: 1000; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Confetti Effect */
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 999; }
        
        /* Drag Drop Builder */
        .builder-area { min-height: 200px; border: 2px dashed var(--glass-border); padding: 10px; display: flex; flex-direction: column; gap: 10px; border-radius: 8px;}
        .draggable-item { background: var(--primary); padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; transition: transform 0.2s; }
        .draggable-item:hover { transform: scale(1.02); }

        /* Animations */
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .timeline-step { display: flex; align-items: flex-start; margin-bottom: 25px; opacity: 0; transition: opacity 0.5s; }
        .timeline-step.visible { opacity: 1; }
        .timeline-dot { width: 24px; height: 24px; border-radius: 50%; background: var(--secondary); margin-right: 20px; box-shadow: 0 0 10px var(--secondary); margin-top: 5px; flex-shrink: 0;}
        
    </style>
</head>
<body>
    <!-- Background Effect -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>
    <canvas id="particles"></canvas>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">🚀 ProgLab XI</div>
            <div style="padding: 0 20px;">
                <div style="display:flex; justify-content:space-between; font-size: 0.8rem; color:var(--text-muted)"><span>Progress</span><span id="nav-pct">0%</span></div>
                <div class="progress-bg" style="margin: 5px 0 20px; height: 6px;"><div class="progress-fill" id="nav-progress"></div></div>
            </div>
            <div class="menu-list" id="menu-container">
                <!-- Menu populated by JS -->
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="content-container">
            <!-- Sections injected via JS -->
        </main>
    </div>

    <!-- Toast Component -->
    <div id="toast">Notifikasi</div>

    <script>
        /**
         * PROGRAMMING LAB XI - INTERACTIVE LOGIC
         * Dibangun menggunakan HTML, CSS, & JS Murni
         */

        // --- 1. STATE MANAGEMENT ---
        const state = {
            currentSection: 'dashboard',
            progress: 0,
            badges: [],
            completedSections: new Set(),
            score: 0
        };

        const menus = [
            { id: 'dashboard', icon: '🏠', title: 'Dashboard' },
            { id: 'materi1', icon: '📖', title: 'Proses Pemrograman' },
            { id: 'materi2', icon: '⚡', title: 'Langkah Pemrograman' },
            { id: 'materi3', icon: '🔄', title: 'Siklus Pemrograman' },
            { id: 'kasus', icon: '🎯', title: 'Contoh Kasus' },
            { id: 'simulasi', icon: '🧠', title: 'Simulasi Analisis' },
            { id: 'flowchart', icon: '🔀', title: 'Flowchart Builder' },
            { id: 'pseudocode', icon: '📝', title: 'Pseudocode Builder' },
            { id: 'coding', icon: '💻', title: 'Coding Lab' },
            { id: 'simulator', icon: '▶️', title: 'Simulator Program' },
            { id: 'testing', icon: '🧪', title: 'Testing Lab' },
            { id: 'debug', icon: '🐛', title: 'Debugging Game' },
            { id: 'quiz', icon: '❓', title: 'Quiz' },
            { id: 'project', icon: '🛠️', title: 'Mini Project' },
            { id: 'sertifikat', icon: '🎓', title: 'Sertifikat' }
        ];

        const badgesDef = [
            { id: 'pemula', name: 'Pemula', icon: '🌱' },
            { id: 'logic', name: 'Logic Master', icon: '🧠' },
            { id: 'flowchart', name: 'Flowchart Master', icon: '🔀' },
            { id: 'debug', name: 'Debug Master', icon: '🐛' },
            { id: 'coding', name: 'Coding Master', icon: '💻' }
        ];

        // --- 2. CORE SYSTEM FUNCTIONS ---
        
        function initApp() {
            renderMenu();
            renderSections();
            setupParticles();
            addRippleEffect();
            navigateTo('dashboard');
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = menus.map(m => `
                <div class="menu-item" onclick="navigateTo('${m.id}')" id="menu-${m.id}">
                    <span>${m.icon}</span> ${m.title}
                </div>
            `).join('');
        }

        function navigateTo(id) {
            // Update Active Menu
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const menuEl = document.getElementById(`menu-${id}`);
            if(menuEl) menuEl.classList.add('active');
            
            // Switch Sections
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            const sec = document.getElementById(`sec-${id}`);
            if(sec) sec.classList.add('active');
            
            state.currentSection = id;
            state.completedSections.add(id);
            updateProgress();

            // Run specific lifecycle hooks
            if(id === 'dashboard') updateDashboard();
            if(id === 'sertifikat') checkSertifikat();
        }

        function updateProgress() {
            const pct = Math.floor((state.completedSections.size / menus.length) * 100);
            state.progress = pct;
            document.getElementById('nav-progress').style.width = `${pct}%`;
            document.getElementById('nav-pct').innerText = `${pct}%`;
            
            if(pct > 10) awardBadge('pemula');
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? 'var(--danger)' : 'var(--success)';
            toast.style.bottom = '20px';
            setTimeout(() => { toast.style.bottom = '-60px'; }, 3000);
        }

        function awardBadge(id) {
            if(!state.badges.includes(id)) {
                state.badges.push(id);
                showToast(`🏆 Badge Baru Diperoleh: ${badgesDef.find(b=>b.id===id).name}`);
                fireConfetti();
                updateDashboard();
            }
        }

        // --- 4. STEP DETAILS INTERACTION (MATERI 2) ---
        function showStepDetail(stepNum) {
            const container = document.getElementById('step-details-container');
            const steps = {
                1: {
                    title: "1. Menganalisis Permasalahan (Analyzing) 🔍",
                    color: "var(--secondary)",
                    content: `
                        <p>Tahap memahami kebutuhan untuk menghasilkan definisi masalah yang perlu diselesaikan.</p>
                        <div class="grid-2">
                            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
                                <h3 style="font-size: 1rem; color: var(--secondary);">Berpikir Komputasional:</h3>
                                <ul style="margin-left: 20px; font-size: 0.85rem; color: var(--text-muted);">
                                    <li><b>Dekomposisi:</b> Memecah masalah besar menjadi sub-masalah kecil.</li>
                                    <li><b>Abstraksi:</b> Fokus pada informasi penting, abaikan yang tidak relevan.</li>
                                </ul>
                            </div>
                            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
                                <h3 style="font-size: 1rem; color: var(--secondary);">Output Analisis:</h3>
                                <p style="font-size: 0.85rem; margin-bottom: 10px;">Pernyataan masalah yang menjelaskan <b>Input</b>, <b>Output</b>, dan <b>Constraint</b>.</p>
                                <div style="font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.1); pt: 10px;">
                                    <p style="margin-bottom: 5px;">📥 <b>Input:</b> Data yang masuk ke program untuk diolah.</p>
                                    <p style="margin-bottom: 5px;">📤 <b>Output:</b> Hasil akhir yang dikeluarkan program.</p>
                                    <p style="margin-bottom: 0;">🛑 <b>Constraint:</b> Batasan atau aturan yang harus ditaati program.</p>
                                </div>
                            </div>
                        </div>
                    `
                },
                2: {
                    title: "2. Mendesain Solusi (Problem Solving) 📐",
                    color: "var(--accent)",
                    content: `
                        <p>Merencanakan strategi untuk menghasilkan keluaran berdasarkan masukan yang diterima.</p>
                        <div class="grid-2">
                            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
                                <h3 style="font-size: 1rem; color: var(--accent);">Metode Desain:</h3>
                                <ul style="margin-left: 20px; font-size: 0.85rem; color: var(--text-muted);">
                                    <li><b>Algoritma:</b> Urutan langkah logis.</li>
                                    <li><b>Flowchart/Pseudocode:</b> Representasi visual atau narasi algoritma.</li>
                                </ul>
                            </div>
                            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
                                <h3 style="font-size: 1rem; color: var(--accent);">Evaluasi:</h3>
                                <p style="font-size: 0.85rem;">Memastikan program bekerja cepat (kurang dari 1 detik) saat diberikan masukan besar.</p>
                            </div>
                        </div>
                    `
                },
                3: {
                    title: "3. Implementasi (Coding) 💻",
                    color: "var(--primary)",
                    content: `
                        <p>Menulis kode program berdasarkan algoritma yang telah dirancang menggunakan bahasa pemrograman tertentu.</p>
                        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
                            <h3 style="font-size: 1rem; color: var(--primary);">Pertimbangan Teknis:</h3>
                            <ul style="margin-left: 20px; font-size: 0.85rem; color: var(--text-muted);">
                                <li>Pemilihan tipe data yang tepat.</li>
                                <li>Struktur kontrol yang digunakan (Looping, Branching).</li>
                                <li>Penggunaan pustaka (Library) atau kode yang sudah ada.</li>
                            </ul>
                        </div>
                    `
                },
                4: {
                    title: "4. Menguji Program (Testing) 🧪",
                    color: "var(--success)",
                    content: `
                        <p>Menguji kebenaran program untuk memastikan program berjalan benar sesuai batasan yang diberikan.</p>
                        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
                            <h3 style="font-size: 1rem; color: var(--success);">Strategi Pengujian:</h3>
                            <ul style="margin-left: 20px; font-size: 0.85rem; color: var(--text-muted);">
                                <li><b>Test Case (Kasus Uji):</b> Menggunakan pasangan data masukan dan keluaran yang diharapkan.</li>
                                <li><b>Analisis Kembali:</b> Jika ditemukan kesalahan, lakukan analisis ulang pada tahap 1.</li>
                            </ul>
                        </div>
                    `
                }
            };

            const step = steps[stepNum];
            container.innerHTML = `
                <div class="glass-card animate-fade">
                    <h2 style="color:${step.color}">${step.title}</h2>
                    ${step.content}
                </div>
            `;
        }

        // --- 5. UI RENDERER ---
        function renderSections() {
            const container = document.getElementById('content-container');
            let html = '';

            /* --- DASHBOARD --- */
            html += `
            <div id="sec-dashboard" class="section">
                <h1>Selamat Datang Programmer! 🚀</h1>
                <p class="typing">Mari belajar proses pemrograman secara interaktif...</p>
                
                <div class="grid-3" style="margin-top:30px">
                    <div class="glass-card text-center">
                        <h3>Progress Belajar</h3>
                        <div class="progress-bg"><div class="progress-fill" id="dash-prog-fill" style="width:0%"></div></div>
                        <h2 id="dash-prog-text">0%</h2>
                        <p style="font-size:0.8rem">Materi Selesai</p>
                    </div>
                    <div class="glass-card text-center">
                        <h3>Total Skor</h3>
                        <h2 id="dash-score" style="font-size: 3rem; color: var(--secondary)">0</h2>
                        <p style="font-size:0.8rem">XP Point</p>
                    </div>
                    <div class="glass-card">
                        <h3>Koleksi Badge</h3>
                        <div id="dash-badges" style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center;">
                            ${badgesDef.map(b => `<span class="badge" id="badge-${b.id}">${b.icon} ${b.name}</span>`).join('')}
                        </div>
                    </div>
                </div>
                
                <div class="glass-card text-center" style="padding: 40px;">
                    <div style="font-size: 5rem; margin-bottom: 20px;">👨‍💻</div>
                    <h2>Siap Menjadi Programmer Handal?</h2>
                    <br>
                    <button class="btn ripple-btn" onclick="navigateTo('materi1')" style="font-size: 1.2rem; padding: 15px 40px;">Mulai Belajar ➡️</button>
                </div>
            </div>`;

            /* --- MATERI 1: PROSES PEMROGRAMAN --- */
            html += `
            <div id="sec-materi1" class="section">
                <h1>Apa itu Pemrograman? 🤔</h1>
                <div class="glass-card">
                    <p>Pemrograman bukan sekadar mengetik kode. Pemrograman adalah <strong>proses menyelesaikan masalah</strong> dengan memberikan instruksi yang logis kepada komputer.</p>
                    <div class="grid-3" style="margin: 40px 0; gap: 40px;">
                        <div class="text-center glass-card">
                            <h3>1. Masalah</h3>
                            <div style="font-size:4rem; margin:10px 0;">🌍</div>
                            <p style="font-size:0.9rem">Dunia nyata punya masalah yang perlu dipecahkan.</p>
                        </div>
                        <div class="text-center glass-card" style="border-color: var(--primary)">
                            <h3>2. Otak Programmer</h3>
                            <div style="font-size:4rem; margin:10px 0;">🧠</div>
                            <p style="font-size:0.9rem">Menganalisis dan memikirkan logika penyelesaian.</p>
                        </div>
                        <div class="text-center glass-card">
                            <h3>3. Solusi Digital</h3>
                            <div style="font-size:4rem; margin:10px 0;">💻</div>
                            <p style="font-size:0.9rem">Aplikasi / Software yang bisa digunakan.</p>
                        </div>
                    </div>
                    <button class="btn ripple-btn" onclick="navigateTo('materi2')">Lanjut: Langkah Pemrograman</button>
                </div>
            </div>`;

            /* --- MATERI 2: LANGKAH PEMROGRAMAN --- */
            html += `
            <div id="sec-materi2" class="section">
                <h1>4 Langkah Utama Pemrograman 🛠️</h1>
                <div class="glass-card" style="margin-bottom: 20px; border-left: 4px solid var(--primary);">
                    <p style="font-size: 0.95rem; margin-bottom: 0;">Menurut buku <i>Oxford Dictionary of Computer Science</i>, pemrograman adalah seluruh aktivitas teknis untuk menghasilkan program, mulai dari analisis hingga implementasi.</p>
                </div>

                <!-- Interactive Step Selector -->
                <div style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;">

            html += `
            <button class="btn ripple-btn" style="width:100%; font-size:1.1rem;" onclick="cekQuiz()">Kumpulkan & Cek Nilai</button>
            <div id="quiz-result" style="margin-top:20px; text-align:center; font-size:1.5rem; font-weight:bold;"></div>
            `;
            cont.innerHTML = html;
        }

        // Initialize quiz after short delay to ensure DOM is ready
        setTimeout(renderQuiz, 500);

        function cekQuiz() {
            let score = 0;
            quizData.forEach((item, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if(selected && parseInt(selected.value) === item.ans) score++;
            });
            
            const resEl = document.getElementById('quiz-result');
            resEl.innerText = `Skor Quiz: ${score} / ${quizData.length}`;
            
            if(score === quizData.length) {
                resEl.style.color = "var(--success)";
                if(!state.badges.includes('pemula')) { // Just giving an extra chance for points
                    state.score += 20;
                }
                showToast("Sempurna! Kamu memahami konsep dasar.");
                fireConfetti();
            } else {
                resEl.style.color = "var(--danger)";
                showToast("Masih ada yang salah, pelajari materi lagi ya.", true);
            }
            updateDashboard();
        }

        // Sertifikat Generator (Printable View)
        function checkSertifikat() {
            const area = document.getElementById('cert-area');
            if(state.progress >= 80 && state.score >= 60) {
                const name = prompt("Selamat! Anda memenuhi syarat kelulusan.\nMasukkan Nama Lengkap Anda untuk di Sertifikat:", "Siswa Hebat");
                if(name) {
                    area.innerHTML = `
                        <div id="print-area" style="border: 10px solid var(--primary); padding: 50px; background: white; color: black; border-radius: 10px; box-shadow: 0 0 30px rgba(255,255,255,0.2);">
                            <div style="font-size:3rem; margin-bottom:10px;">🏆</div>
                            <h1 style="color:var(--bg); font-family:serif; letter-spacing: 2px;">SERTIFIKAT KELULUSAN</h1>
                            <p style="color:#555; font-size:1.2rem; margin: 20px 0;">Diberikan dengan bangga kepada:</p>
                            <h2 style="font-size:3rem; color:var(--primary); margin: 30px 0; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; display:inline-block;">${name}</h2>
                            <p style="color:#333; font-size:1.2rem; max-width:600px; margin: 0 auto;">Telah berhasil menyelesaikan pembelajaran interaktif <strong>"Programming Lab XI - Proses Pemrograman"</strong> dengan predikat Sangat Baik.</p>
                            
                            <div style="display:flex; justify-content:space-between; margin-top:60px; text-align:center;">
                                <div>
                                    <p style="font-weight:bold; color:var(--bg)">XP Point</p>
                                    <h3 style="color:var(--accent)">${state.score} XP</h3>
                                </div>
                                <div>
                                    <p style="color:var(--bg); margin-bottom:10px;">Instruktur Pemrograman</p>
                                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 50'><path d='M10,25 Q30,10 50,25 T90,25' fill='none' stroke='black' stroke-width='3'/></svg>" height="40">
                                    <p style="font-weight:bold; border-top:1px solid #333; padding-top:5px;">System AI</p>
                                </div>
                            </div>
                        </div>
                        <button class="btn ripple-btn" style="margin-top:30px; font-size:1.2rem;" onclick="window.print()">🖨️ Cetak / Simpan PDF</button>
                    `;
                    fireConfetti();
                }
            }
        }

        // --- 5. VISUAL EFFECTS CORE ---
        
        function addRippleEffect() {
            document.addEventListener('click', function(e) {
                if(e.target.classList.contains('ripple-btn')) {
                    let btn = e.target;
                    let ripple = document.createElement('span');
                    ripple.classList.add('ripple');
                    
                    let rect = btn.getBoundingClientRect();
                    ripple.style.left = `${e.clientX - rect.left - 25}px`;
                    ripple.style.top = `${e.clientY - rect.top - 25}px`;
                    ripple.style.width = ripple.style.height = '50px';
                    
                    btn.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                }
            });
        }

        function fireConfetti() {
            for(let i=0; i<60; i++) {
                let conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.background = ['var(--primary)', 'var(--secondary)', 'var(--accent)', '#ffffff'][Math.floor(Math.random()*4)];
                document.body.appendChild(conf);
                
                let fallSpeed = Math.random() * 3 + 2;
                let rotate = Math.random() * 360;
                
                let anim = setInterval(() => {
                    let top = parseFloat(conf.style.top) || -20;
                    if(top > window.innerHeight) {
                        clearInterval(anim); conf.remove();
                    } else {
                        conf.style.top = (top + fallSpeed) + 'px';
                        rotate += 5;
                        conf.style.transform = `rotate(${rotate}deg)`;
                    }
                }, 20);
            }
        }

        // Lightweight Canvas Particle Background
        function setupParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const p = [];
            for(let i=0; i<50; i++) {
                p.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2,
                    dx: (Math.random() - 0.5) * 0.5,
                    dy: (Math.random() - 0.5) * 0.5
                });
            }

            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                p.forEach(dot => {
                    ctx.beginPath();
                    ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI*2);
                    ctx.fill();
                    dot.x += dot.dx; dot.y += dot.dy;
                    // Bounce borders
                    if(dot.x < 0 || dot.x > canvas.width) dot.dx *= -1;
                    if(dot.y < 0 || dot.y > canvas.height) dot.dy *= -1;
                });
                requestAnimationFrame(draw);
            }
            draw();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // Style overrides for Print Mode
        const style = document.createElement('style');
        style.innerHTML = `
            @media print {
                body * { visibility: hidden; }
                #print-area, #print-area * { visibility: visible; }
                #print-area { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; border: none; }
                .sidebar, .btn { display: none !important; }
            }
        `;
        document.head.appendChild(style);

        // Boot the App
        window.onload = initApp;
    </script>
</body>
